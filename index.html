<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport & PWA basics -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="color-scheme" content="light" />

    <!-- Primary SEO -->
    <title>Mudra - Smart Expense Tracker & Budget Manager</title>
    <meta name="description" content="Mudra is a free personal finance app to track daily expenses, manage budgets, schedule bills, and analyze spending habits — all in one place." />
    <meta name="keywords" content="expense tracker, budget manager, personal finance, spending tracker, bill tracker, money manager, mudra, kharch, hisaab" />
    <meta name="author" content="Mudra" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mudra" />
    <meta property="og:title" content="Mudra - Smart Expense Tracker & Budget Manager" />
    <meta property="og:description" content="Track expenses, manage budgets, and analyze your spending with Mudra — your personal finance companion." />
    <meta property="og:image" content="/icons/icon.svg" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mudra - Smart Expense Tracker" />
    <meta name="twitter:description" content="Track expenses, manage budgets, and analyze your spending with Mudra." />
    <meta name="twitter:image" content="/icons/icon.svg" />

    <!-- PWA / Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mudra" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
